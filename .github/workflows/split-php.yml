name: Split PHP SDK

on:
  push:
    branches:
      - main
    paths:
      - 'php/**'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: EZSCALE

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: EZSCALE/virtfusion-php
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 0

      - name: Split and push
        run: |
          cd "$GITHUB_WORKSPACE"
          SHA=$(git subtree split --prefix=php/ HEAD)
          cd target-repo
          git fetch "$GITHUB_WORKSPACE" "${SHA}"
          git checkout -B main "${SHA}"
          git push origin main --force
