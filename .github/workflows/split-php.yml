name: Split PHP SDK

on:
  push:
    branches:
      - main
    paths:
      - 'php/**'

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: EZSCALE
          repositories: virtfusion-php

      - name: Split and push
        uses: splitsh/lite-action@v2.0.0
        with:
          source: 'php/'
          target_repo: 'https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/EZSCALE/virtfusion-php.git'
          target_branch: 'main'
