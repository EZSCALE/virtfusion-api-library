name: Split PHP SDK

on:
  push:
    branches:
      - main
    paths:
      - 'php/**'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: EZSCALE

      - name: Split and push
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${TOKEN}@github.com" > ~/.git-credentials
          SHA=$(git subtree split --prefix=php/ HEAD)
          git push "https://github.com/EZSCALE/virtfusion-php.git" "${SHA}:refs/heads/main" --force
